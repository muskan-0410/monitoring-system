<!doctype html>
<html>
  <head>
    <title>Monitoring Dashboard</title>
    <style>
      body {
        font-family: Arial;
        background: #f4f4f4;
        text-align: center;
      }
      h1 {
        color: #2c3e50;
      }
      .card {
        background: white;
        padding: 20px;
        margin: 20px;
        display: inline-block;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-deep: #0a0f1e;
        --bg-surface: #111827;
        --bg-card: #1a2235;
        --bg-card-hover: #1f2a40;
        --border: rgba(99, 179, 237, 0.12);
        --border-hover: rgba(99, 179, 237, 0.28);

        --text-primary: #e8f0fe;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;

        --accent-blue: #60a5fa;
        --accent-cyan: #22d3ee;
        --accent-green: #34d399;
        --accent-amber: #fbbf24;
        --accent-red: #f87171;
        --accent-purple: #a78bfa;

        --gradient-header: linear-gradient(135deg, #1e3a5f 0%, #0f2744 100%);
        --gradient-card-shine: linear-gradient(
          90deg,
          transparent,
          rgba(96, 165, 250, 0.06),
          transparent
        );

        --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
        --shadow-card-hover:
          0 12px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(99, 179, 237, 0.2);

        --radius-card: 18px;
        --radius-sm: 10px;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg-deep);
        background-image:
          radial-gradient(
            ellipse 80% 50% at 50% -20%,
            rgba(30, 64, 120, 0.45) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 40% at 80% 80%,
            rgba(20, 50, 100, 0.3) 0%,
            transparent 60%
          );
        min-height: 100vh;
        padding: 30px 20px;
        color: var(--text-primary);
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      /* ── Header ── */
      header {
        text-align: center;
        margin-bottom: 50px;
        animation: slideDown 0.6s ease-out;
      }

      .logo {
        font-size: 48px;
        margin-bottom: 10px;
        filter: drop-shadow(0 0 20px rgba(96, 165, 250, 0.5));
      }

      header h1 {
        font-size: 3.2em;
        margin-bottom: 10px;
        background: linear-gradient(
          90deg,
          var(--accent-blue),
          var(--accent-cyan),
          var(--accent-green)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: 700;
        letter-spacing: 1px;
      }

      header p {
        font-size: 1.1em;
        color: var(--text-secondary);
        margin-bottom: 20px;
      }

      /* ── Status Bar ── */
      .status-bar {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      .status-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9em;
        color: var(--text-secondary);
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent-green);
        box-shadow: 0 0 8px var(--accent-green);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          box-shadow: 0 0 8px var(--accent-green);
        }
        50% {
          opacity: 0.5;
          box-shadow: 0 0 3px var(--accent-green);
        }
      }

      /* ── Dashboard Grid ── */
      .dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 40px;
        margin-bottom: 40px;
      }

      /* ── Cards ── */
      .card {
        background: var(--bg-card);
        border-radius: var(--radius-card);
        padding: 28px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-card);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease,
          background 0.3s ease,
          border-color 0.3s ease;
        position: relative;
        overflow: hidden;
        animation: fadeIn 0.6s ease-out both;
      }

      .card:hover {
        transform: translateY(-6px);
        background: var(--bg-card-hover);
        box-shadow: var(--shadow-card-hover);
        border-color: var(--border-hover);
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 2px;
        background: var(--gradient-card-shine);
        animation: shine 4s infinite;
      }

      @keyframes shine {
        0% {
          left: -100%;
        }
        100% {
          left: 100%;
        }
      }

      .card-icon {
        font-size: 2.2em;
        margin-bottom: 14px;
      }

      .card h2 {
        font-size: 1.1em;
        margin-bottom: 14px;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      /* ── Metric Value ── */
      .metric-value {
        font-size: 3.2em;
        font-weight: 700;
        margin: 16px 0;
        font-family: "DM Mono", monospace;
        color: var(--text-primary);
      }

      /* ── Progress Rings ── */
      .progress-ring-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 20px auto;
        position: relative;
        width: 150px;
        height: 150px;
      }

      .progress-ring {
        transform: rotate(-90deg);
        transform-origin: 75px 75px;
      }

      .progress-ring-circle {
        transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .progress-value {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 2.2em;
        font-weight: 700;
        font-family: "DM Mono", monospace;
        color: var(--text-primary);
      }

      /* ── Status Text ── */
      .status-text {
        font-size: 0.9em;
        color: var(--text-secondary);
        margin-top: 10px;
        text-align: center;
      }

      /* ── Alert ── */
      .alert {
        background: rgba(248, 113, 113, 0.12);
        border-left: 3px solid var(--accent-red);
        padding: 12px 15px;
        border-radius: var(--radius-sm);
        margin-top: 14px;
        font-size: 0.88em;
        color: #fca5a5;
        display: none;
      }

      .alert.show {
        display: block;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-16px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Chart Container ── */
      .chart-container {
        position: relative;
        height: 300px;
        margin-top: 28px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
      }

      /* ── Connection Status Badge ── */
      .connection-status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border-radius: 20px;
        font-size: 0.82em;
        font-weight: 500;
        margin-top: 14px;
        background: rgba(52, 211, 153, 0.12);
        color: var(--accent-green);
        border: 1px solid rgba(52, 211, 153, 0.3);
        letter-spacing: 0.04em;
      }

      .connection-status.offline {
        background: rgba(248, 113, 113, 0.12);
        color: var(--accent-red);
        border-color: rgba(248, 113, 113, 0.3);
      }

      /* ── Last Update ── */
      .last-update {
        font-size: 0.82em;
        color: var(--text-muted);
        margin-top: 8px;
      }

      /* ── Footer ── */
      .footer {
        text-align: center;
        padding: 28px 0;
        color: var(--text-muted);
        font-size: 0.88em;
        border-top: 1px solid var(--border);
        margin-top: 50px;
      }

      /* ── Responsive ── */
      @media (max-width: 768px) {
        header h1 {
          font-size: 2em;
        }

        .dashboard {
          grid-template-columns: 1fr;
        }

        .metric-value {
          font-size: 2.4em;
        }
      }
    </style>
  </head>

  <body>
    <h1>Real-Time Monitoring Dashboard</h1>
    <p>Live system metrics and alerts</p>

    <div class="card">
      <h2>CPU Usage</h2>
      <p id="cpu">Loading...</p>
      <p id="cpu-alert" style="color: red; font-weight: bold;"></p>
    </div>

    <div class="card">
      <h2>Memory Usage</h2>
      <p id="memory">Loading...</p>
    </div>

    <div class="card">
      <h2>Disk Usage</h2>
      <p id="disk">Loading...</p>
    </div>

    <script>
  const ws = new WebSocket("ws://127.0.0.1:8080");

  ws.onopen = () => {
    console.log("Connected to backend");
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "SYSTEM_METRICS") {
      document.getElementById("cpu").innerText = data.cpu + "%";
      document.getElementById("memory").innerText = data.memory + "%";
      document.getElementById("disk").innerText = data.disk + "%";
    }

    if (data.type === "CPU_ALERT") {
      document.getElementById("cpu-alert").innerText = "⚠ High CPU!";
    }

    if (data.type === "MEMORY_ALERT") {
      alert("⚠ High Memory Usage!");
    }

    if (data.type === "DISK_ALERT") {
      alert("⚠ High Disk Usage!");
    }
  };

  ws.onerror = (err) => {
    console.log("WebSocket error:", err);
  };

  ws.onclose = () => {
    console.log("Disconnected from server");
  };
</script>
  </body>
</html>
