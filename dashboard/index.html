<!DOCTYPE html>
<html>
<head>
    <title>Monitoring Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 20px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<h1>Real-Time Monitoring Dashboard</h1>
<p>Live system metrics and alerts</p>

<div class="card">
    <h2>CPU Usage</h2>
    <p id="cpu">Loading...</p>
</div>

<div class="card">
    <h2>Memory Usage</h2>
    <p id="memory">Loading...</p>
</div>

<div class="card">
    <h2>Disk Usage</h2>
    <p id="disk">Loading...</p>
</div>

<script>
    // fake data (for demo)
    setInterval(() => {
        document.getElementById("cpu").innerText = Math.floor(Math.random()*100) + "%";
        document.getElementById("memory").innerText = Math.floor(Math.random()*100) + "%";
        document.getElementById("disk").innerText = Math.floor(Math.random()*100) + "%";
    }, 2000);
</script>

</body>
</html>
